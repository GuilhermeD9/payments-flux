services:
  postgres:
    container_name: postgres-db
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=payment_db'
      - 'POSTGRES_USER=postgres'
      - 'POSTGRES_PASSWORD=secret'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    container_name: redis-cache
    image: 'redis:alpine'
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
    driver: local